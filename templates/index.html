{% extends "base.html" %}
{% block content %}

<div class="card shadow-sm p-4 mb-4" style="border-radius:16px;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">🔎 Buscar Leads</h4>
        <small class="text-muted">Filtre empresas rapidamente</small>
    </div>

    <form method="POST" id="formBusca">
        <div class="row g-3 align-items-end">

            <div class="col-md-2">
                <label class="form-label">UF</label>
                <input type="text" name="uf" class="form-control" placeholder="Ex: BA">
            </div>

            <div class="col-md-4">
                <label class="form-label">Município</label>
                <select name="cidade" class="form-select">
                    <option value="">Selecione</option>
                    {% for codigo, nome in municipios.items() %}
                        <option value="{{ codigo }}">{{ nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Palavra-chave</label>
                <input type="text" name="palavra" class="form-control" placeholder="Ex: clínica">
            </div>

            <div class="col-md-2">
                <label class="form-label">Data mínima</label>
                <input type="date" name="data" class="form-control">
            </div>

            <div class="col-md-1">
                <button class="btn btn-primary w-100 btn-lg">
                    🔍
                </button>
            </div>

        </div>
    </form>

</div>

{% endblock %}
