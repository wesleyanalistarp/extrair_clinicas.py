{% extends "base.html" %}
{% block content %}

<div class="card shadow-sm p-4 mb-4 no-hover" style="border-radius:16px;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">🔎 Buscar Leads</h4>
        <small class="text-muted">Filtre empresas rapidamente</small>
    </div>

    <form method="POST" id="formBusca">
        <div class="row g-3 align-items-end">

            <div class="col-md-2">
                <label class="form-label">UF</label>
                <input type="text" name="uf" class="form-control" placeholder="Ex: BA/SP/MA">
            </div>

            <div class="col-md-4 position-relative">

                <label class="form-label">Município</label>

                <input type="text" id="municipioInput" class="form-control" placeholder="Digite a cidade..."
                    autocomplete="off">

                <input type="hidden" name="cidade" id="cidadeCodigo">

                <div id="listaMunicipios" class="lista-municipios"></div>

        </div>

        <div class="col-md-3">
            <label class="form-label">Palavra-chave</label>
            <input type="text" name="palavra" class="form-control" placeholder="Ex: clínica">
        </div>

        <div class="col-md-2">
            <label class="form-label">Data mínima</label>
            <input type="date" name="data" class="form-control">
        </div>

        <div class="col-md-1">
            <button class="btn btn-primary w-100 btn-lg">
                🔍
            </button>
        </div>

</div>
</form>

</div>
<script>

const municipios = JSON.parse('{{ municipios|tojson|safe }}');

const inputMunicipio = document.getElementById("municipioInput");

const listaMunicipios = document.getElementById("listaMunicipios");

const cidadeCodigo = document.getElementById("cidadeCodigo");

inputMunicipio.addEventListener("input", function(){

    const valor = this.value.toLowerCase();

    listaMunicipios.innerHTML = "";

    if(valor.length < 1){

        listaMunicipios.style.display = "none";

        return;
    }

    const filtrados = Object.entries(municipios)
    .filter(([codigo, nome]) =>
        nome.toLowerCase().includes(valor)
    );

    filtrados.slice(0, 15).forEach(([codigo, nome]) => {

        const item = document.createElement("div");

        item.className = "item-municipio";

        item.innerText = nome;

            item.onclick = () => {

            inputMunicipio.value = nome;

            listaMunicipios.style.display = "none";

            cidadeCodigo.value = codigo;
        };

        listaMunicipios.appendChild(item);

    });

    listaMunicipios.style.display =
        filtrados.length ? "block" : "none";

});

document.addEventListener("click", function(e){

    if(!listaMunicipios.contains(e.target) &&
       e.target !== inputMunicipio){

        listaMunicipios.style.display = "none";
    }

});

</script>
{% endblock %}
