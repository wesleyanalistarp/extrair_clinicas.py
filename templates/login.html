<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login - Leads Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        body.loaded {
            opacity: 1;
        }

        .left-side {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;

            transform: translateX(-30px);
            opacity: 0;
            animation: slideLeft 0.8s ease forwards;
        }

        .card {
            transform: translateY(10px);
            opacity: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.8s ease forwards;
            animation-delay: 0.2s;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideLeft {
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* LOADING PREMIUM */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9999;
            color: white;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 15px;
            font-size: 18px;
        }

        /* MOBILE LOGIN BACKGROUND */
        @media (max-width: 768px) {
            body {
                background: linear-gradient(135deg,
                        #4f46e5,
                        #7c3aed,
                        #a78bfa);
            }

            .container-fluid {
                background: transparent !important;
            }
        }

        /* CARD ESTILO PREMIUM */
        .card-login {
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            padding: 25px;
        }

        /* BOTÃO VOLTAR */
        .btn-voltar-login {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-voltar-login:hover {
            color: #111827;
        }
    </style>
</head>

<body>

    <div class="container-fluid vh-100">
        <div class="row h-100">

            <!-- ESQUERDA -->
            <div class="col-md-6 d-none d-md-flex flex-column justify-content-center align-items-center left-side">
                <div class="text-center px-4">
                    <h1 class="mb-3">🚀 Leads Pro</h1>
                    <p>Gere leads qualificados para seu negócio em segundos.</p>

                    <small>
                        ✔ Base com milhões de empresas<br>
                        ✔ Filtros inteligentes<br>
                        ✔ Contato direto via WhatsApp
                    </small>

                    <div class="mt-4">
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="max-width: 180px;">
                    </div>
                </div>
            </div>

            <!-- DIREITA -->
            <div class="col-md-6 d-flex justify-content-center align-items-center position-relative">

                <div class="card card-login w-100">

                    <div class="text-center mb-3">
                        <h4>🔐 Entrar</h4>
                        <small class="text-muted">Acesse sua conta</small>
                    </div>

                    {% if erro %}
                    <div class="alert alert-danger text-center py-2">
                        {{ erro }}
                    </div>
                    {% endif %}

                    <form method="POST">

                        <div class="mb-2">
                            <input name="email" class="form-control" placeholder="Email" required>
                        </div>

                        <div class="mb-3">
                            <input name="password" type="password" class="form-control" placeholder="Senha" required>
                        </div>

                        <button class="btn btn-primary w-100 fw-semibold">
                            Entrar
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <small>
                            Não tem conta?
                            <a href="/register">Criar conta</a>
                        </small>
                        <a href="/" class="btn-voltar-login">
                            ← Voltar para Home
                        </a>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <!-- LOADING -->
    <div id="loadingOverlay" style="display:none;">
        <div class="loader"></div>
        <div class="loading-text">Entrando no sistema...</div>
    </div>

    <script>
        window.addEventListener("load", function () {
            document.body.classList.add("loaded");
        });

        const form = document.querySelector("form");

        if (form) {
            form.addEventListener("submit", function () {

                const overlay = document.getElementById("loadingOverlay");

                if (overlay) {
                    overlay.style.display = "flex";
                }

                const btn = form.querySelector("button");
                if (btn) {
                    btn.disabled = true;
                    btn.innerText = "Entrando...";
                }
            });
        }
    </script>

</body>

</html>
