{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center align-items-center vh-100">

    <div class="card card-custom p-4" style="width: 100%; max-width: 400px;">

        <div class="text-center mb-4">
            <h3 class="logo">🚀 Leads Pro</h3>
            <p class="text-muted">Crie sua conta</p>
        </div>

        <!-- 🔴 ERRO -->
        {% if erro %}
        <div class="alert alert-danger text-center">
            {{ erro }}
        </div>
        {% endif %}

        <form method="POST">

            <div class="mb-3">
                <input name="email"
                       class="form-control {% if erro %}is-invalid{% endif %}"
                       placeholder="Email"
                       required>
            </div>

            <div class="mb-3">
                <input name="password"
                       type="password"
                       class="form-control {% if erro %}is-invalid{% endif %}"
                       placeholder="Senha"
                       required>
            </div>

            <button class="btn btn-success w-100 mb-3">
                Criar conta
            </button>

        </form>

        <div class="text-center">
            <small>
                Já tem conta?
                <a href="/login">Entrar</a>
            </small>
        </div>

    </div>

</div>

{% endblock %}
