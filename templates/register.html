{% extends "base.html" %}
{% block content %}

<style>
    /* 🔥 OVERLAY SUCESSO */
    #successOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(6px);

        display: flex;
        align-items: center;
        justify-content: center;

        z-index: 9999;
        animation: fadeIn 0.3s ease;
    }

    .success-box {
        background: white;
        padding: 30px 40px;
        border-radius: 16px;
        text-align: center;
        font-weight: 600;
        font-size: 18px;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }
    .card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border: none;
}

    /* animação */
    @keyframes fadeIn {
        from {
            opacity: 0;
        }

        to {
            opacity: 1;
        }
    }

    /* 🔥 FUNDO ROXO PADRÃO */
    body {
        background: radial-gradient(circle at top left,
                rgba(167, 139, 250, 0.25),
                transparent 40%),
            linear-gradient(135deg,
                #4f46e5,
                #7c3aed);

        min-height: 100vh;
    }
</style>
{% if erro %}
<div class="alert alert-danger text-center">
    {{ erro }} <br>
    <a href="/login" class="fw-bold">Ir para login</a>
</div>
{% endif %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card shadow-sm p-4" style="border-radius:16px; width:100%; max-width:400px;">

        <h4 class="text-center mb-2">🚀 CallVendas</h4>
        <p class="text-center text-muted mb-4">Crie sua conta</p>

        <form method="POST">

            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Senha" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Criar conta
            </button>

        </form>

        <div class="text-center mt-3">
            <small>Já tem conta? <a href="/login">Entrar</a></small>
        </div>

    </div>
</div>

<!-- 🔥 OVERLAY APÓS CADASTRO -->
{% if sucesso %}
<div id="successOverlay">
    <div class="success-box">
        ✅ Usuário cadastrado com sucesso<br>
        <small>Direcionando para login...</small>
    </div>
</div>

<script>
    setTimeout(() => {
        window.location.href = "/login";
    }, 1800);
</script>
{% endif %}

{% endblock %}
